<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkPage</title>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;600;700&family=Satoshi:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;transition:all .3s}

/* THEMES */
.theme-purple{background:linear-gradient(135deg,#1a0533 0%,#2d1060 50%,#1a0533 100%);color:#fff}
.theme-ocean{background:linear-gradient(135deg,#0c1e3d 0%,#0f4c75 50%,#0c2340 100%);color:#fff}
.theme-sunset{background:linear-gradient(135deg,#1a0800 0%,#7c2d12 40%,#1a0800 100%);color:#fff}
.theme-forest{background:linear-gradient(135deg,#071a0b 0%,#14532d 50%,#071a0b 100%);color:#fff}
.theme-rose{background:linear-gradient(135deg,#1a0011 0%,#831843 50%,#1a0011 100%);color:#fff}

/* ANIMATED BG ORBS */
.orbs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:.4;animation:orbFloat 12s ease-in-out infinite}
.orb:nth-child(2){animation-delay:-4s}.orb:nth-child(3){animation-delay:-8s}
@keyframes orbFloat{0%,100%{transform:translate(0,0)}33%{transform:translate(40px,-30px)}66%{transform:translate(-30px,40px)}}

/* EDIT / VIEW TOGGLE */
.top-bar{position:fixed;top:0;left:0;right:0;z-index:100;padding:.8rem 1.5rem;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.2);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.08)}
.site-name{font-size:.85rem;font-weight:700;color:rgba(255,255,255,.6);letter-spacing:.05em}
.top-actions{display:flex;gap:.5rem}
.top-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.7);font-family:'Plus Jakarta Sans',sans-serif;font-size:.75rem;font-weight:600;padding:.4rem .9rem;border-radius:20px;cursor:pointer;transition:all .2s}
.top-btn:hover{background:rgba(255,255,255,.2);color:#fff}
.top-btn.primary{background:rgba(255,255,255,.9);color:#111}
.top-btn.primary:hover{background:#fff}

/* MAIN PAGE WRAP */
.page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:6rem 1.5rem 4rem;max-width:600px;margin:0 auto;width:100%}

/* PROFILE SECTION */
.avatar-wrap{position:relative;margin-bottom:1.2rem}
.avatar{width:96px;height:96px;border-radius:50%;border:3px solid rgba(255,255,255,.3);object-fit:cover;background:linear-gradient(135deg,rgba(255,255,255,.3),rgba(255,255,255,.1));display:flex;align-items:center;justify-content:center;font-size:3rem;cursor:pointer;overflow:hidden;transition:all .2s}
.avatar:hover{border-color:rgba(255,255,255,.6);transform:scale(1.05)}
.avatar-edit{position:absolute;bottom:2px;right:2px;width:26px;height:26px;background:rgba(255,255,255,.9);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;cursor:pointer;border:2px solid rgba(0,0,0,.1);transition:all .15s}
.avatar-edit:hover{background:#fff;transform:scale(1.1)}
.profile-name{font-size:1.5rem;font-weight:800;color:#fff;text-align:center;margin-bottom:.4rem;cursor:pointer;transition:all .2s}
.profile-name:hover .edit-hint{opacity:1}
.edit-hint{opacity:0;font-size:.65rem;color:rgba(255,255,255,.4);margin-left:.4rem;transition:opacity .2s}
.profile-bio{font-size:.88rem;color:rgba(255,255,255,.6);text-align:center;line-height:1.6;max-width:380px;cursor:pointer}
.profile-bio:hover{color:rgba(255,255,255,.8)}

/* VISIT COUNTER */
.visit-pill{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:.3rem .9rem;font-size:.72rem;color:rgba(255,255,255,.4);margin:1rem 0;display:flex;align-items:center;gap:.4rem}
.visit-dot{width:6px;height:6px;background:#4ade80;border-radius:50%;box-shadow:0 0 6px #4ade80;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* THEME SWITCHER */
.theme-bar{display:flex;gap:.5rem;margin-bottom:1.8rem;flex-wrap:wrap;justify-content:center}
.theme-dot{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid rgba(255,255,255,.2);transition:all .2s;flex-shrink:0}
.theme-dot:hover,.theme-dot.active{border-color:#fff;transform:scale(1.2);box-shadow:0 0 12px rgba(255,255,255,.3)}

/* LINKS */
.links-wrap{width:100%;display:flex;flex-direction:column;gap:.75rem}
.link-card{width:100%;background:rgba(255,255,255,.1);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.15);border-radius:16px;padding:1rem 1.4rem;display:flex;align-items:center;gap:1rem;cursor:pointer;transition:all .25s;text-decoration:none;color:#fff;position:relative;overflow:hidden}
.link-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.08),rgba(255,255,255,0));opacity:0;transition:opacity .2s}
.link-card:hover{transform:translateY(-2px) scale(1.01);background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.3);box-shadow:0 12px 30px rgba(0,0,0,.2)}
.link-card:hover::before{opacity:1}
.link-card:active{transform:translateY(0) scale(.99)}
.link-icon{font-size:1.4rem;flex-shrink:0;width:40px;text-align:center}
.link-text{flex:1;min-width:0}
.link-title{font-size:.95rem;font-weight:700;display:block}
.link-desc{font-size:.72rem;color:rgba(255,255,255,.5);margin-top:.1rem;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.link-arrow{color:rgba(255,255,255,.3);font-size:.9rem;transition:transform .2s;flex-shrink:0}
.link-card:hover .link-arrow{transform:translateX(3px);color:rgba(255,255,255,.6)}
.link-visits{position:absolute;top:.5rem;right:2.5rem;font-size:.58rem;color:rgba(255,255,255,.3);font-weight:600}

/* ADD LINK BUTTON */
.add-link-btn{width:100%;background:rgba(255,255,255,.05);border:2px dashed rgba(255,255,255,.15);border-radius:16px;padding:1rem;color:rgba(255,255,255,.4);font-family:'Plus Jakarta Sans',sans-serif;font-size:.88rem;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:.5rem;margin-top:.25rem}
.add-link-btn:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.3);color:rgba(255,255,255,.7)}

/* EDIT MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);z-index:200;align-items:center;justify-content:center;padding:1rem}
.modal-bg.open{display:flex}
.modal{background:#1a1a2e;border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:1.8rem;width:100%;max-width:420px;box-shadow:0 30px 80px rgba(0,0,0,.4)}
.modal h3{font-size:1.1rem;font-weight:800;color:#fff;margin-bottom:1.2rem}
.modal label{display:block;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.35);margin-bottom:.3rem;margin-top:.9rem}
.modal label:first-of-type{margin-top:0}
.modal input,.modal textarea{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:10px;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-size:.9rem;padding:.65rem .9rem;outline:none;transition:all .2s}
.modal input:focus,.modal textarea:focus{border-color:rgba(139,92,246,.5);background:rgba(139,92,246,.08)}
.modal textarea{resize:vertical;min-height:60px}
.modal-btns{display:flex;gap:.6rem;margin-top:1.2rem}
.mbtn{flex:1;padding:.7rem;border-radius:10px;border:none;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:.85rem;cursor:pointer;transition:all .15s}
.mbtn-save{background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff}
.mbtn-save:hover{opacity:.9}
.mbtn-del{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.2)}
.mbtn-del:hover{background:rgba(239,68,68,.25)}
.mbtn-cancel{background:rgba(255,255,255,.08);color:rgba(255,255,255,.6)}
.mbtn-cancel:hover{background:rgba(255,255,255,.14)}

/* FOOTER */
.footer{margin-top:2rem;font-size:.7rem;color:rgba(255,255,255,.2);text-align:center}
.footer a{color:rgba(255,255,255,.3);text-decoration:none}
.footer a:hover{color:rgba(255,255,255,.6)}
</style>
</head>
<body class="theme-purple">
<div class="orbs">
  <div class="orb" style="width:400px;height:400px;background:rgba(139,92,246,.5);top:-100px;left:-100px"></div>
  <div class="orb" style="width:300px;height:300px;background:rgba(236,72,153,.4);bottom:-80px;right:-80px"></div>
  <div class="orb" style="width:250px;height:250px;background:rgba(59,130,246,.3);top:40%;left:60%"></div>
</div>

<div class="top-bar">
  <div class="site-name">✦ LinkPage</div>
  <div class="top-actions">
    <button class="top-btn" onclick="openProfileEdit()">✏️ Edit Profile</button>
    <button class="top-btn primary" onclick="copyPageUrl()">🔗 Share</button>
  </div>
</div>

<div class="page">
  <div class="avatar-wrap">
    <div class="avatar" id="avatar" onclick="openProfileEdit()">😎</div>
    <div class="avatar-edit" onclick="openProfileEdit()">✏️</div>
  </div>
  <div class="profile-name" id="profile-name" onclick="openProfileEdit()">Your Name <span class="edit-hint">✏️</span></div>
  <div class="profile-bio" id="profile-bio" onclick="openProfileEdit()">Your bio goes here — tell people who you are ✨</div>

  <div class="visit-pill"><span class="visit-dot"></span><span id="visit-count">0 profile views</span></div>

  <div class="theme-bar" id="theme-bar"></div>

  <div class="links-wrap" id="links-wrap"></div>
  <button class="add-link-btn" onclick="openAddLink()">＋ Add Link</button>

  <div class="footer">Built with LinkPage · <a href="#" onclick="resetAll()">Reset all</a></div>
</div>

<!-- PROFILE EDIT MODAL -->
<div class="modal-bg" id="profile-modal">
  <div class="modal">
    <h3>Edit Profile</h3>
    <label>Display Name</label>
    <input id="pe-name" placeholder="Your Name">
    <label>Bio</label>
    <textarea id="pe-bio" placeholder="Tell people who you are…"></textarea>
    <label>Avatar Emoji</label>
    <input id="pe-avatar" placeholder="e.g. 😎 or 🦊 or 🚀" maxlength="4">
    <div class="modal-btns">
      <button class="mbtn mbtn-cancel" onclick="closeModal('profile-modal')">Cancel</button>
      <button class="mbtn mbtn-save" onclick="saveProfile()">Save</button>
    </div>
  </div>
</div>

<!-- LINK EDIT MODAL -->
<div class="modal-bg" id="link-modal">
  <div class="modal">
    <h3 id="link-modal-title">Add Link</h3>
    <label>Icon / Emoji</label>
    <input id="lm-icon" placeholder="🔗  or  🐦  or  💼" maxlength="4">
    <label>Title *</label>
    <input id="lm-title" placeholder="My Website">
    <label>URL *</label>
    <input id="lm-url" type="url" placeholder="https://...">
    <label>Description (optional)</label>
    <input id="lm-desc" placeholder="Short description">
    <div class="modal-btns">
      <button class="mbtn mbtn-cancel" onclick="closeModal('link-modal')">Cancel</button>
      <button class="mbtn mbtn-del" id="lm-del" style="display:none" onclick="deleteLink()">Delete</button>
      <button class="mbtn mbtn-save" onclick="saveLink()">Save</button>
    </div>
  </div>
</div>

<script>
const THEMES=[
  {id:'purple',colors:['#7c3aed','#a855f7'],label:'Purple'},
  {id:'ocean',colors:['#0f4c75','#1b9aaa'],label:'Ocean'},
  {id:'sunset',colors:['#c73b1a','#f5a623'],label:'Sunset'},
  {id:'forest',colors:['#14532d','#4ade80'],label:'Forest'},
  {id:'rose',colors:['#831843','#f43f5e'],label:'Rose'},
];

let profile=JSON.parse(localStorage.getItem('lp_profile')||'{"name":"Your Name","bio":"Your bio goes here — tell people who you are ✨","avatar":"😎","theme":"purple"}');
let links=JSON.parse(localStorage.getItem('lp_links')||'[]');
let visits=JSON.parse(localStorage.getItem('lp_visits')||'{}');
let editingLink=null;

// Track visit
const today=new Date().toDateString();
visits[today]=(visits[today]||0)+1;
localStorage.setItem('lp_visits',JSON.stringify(visits));
const totalVisits=Object.values(visits).reduce((a,b)=>a+b,0);

// Default links if empty
if(!links.length){
  links=[
    {id:1,icon:'🌐',title:'My Website',url:'https://example.com',desc:'Check out my work',clicks:0},
    {id:2,icon:'🐦',title:'Twitter / X',url:'https://twitter.com',desc:'Follow me for updates',clicks:0},
    {id:3,icon:'💼',title:'LinkedIn',url:'https://linkedin.com',desc:'Let\'s connect professionally',clicks:0},
    {id:4,icon:'📸',title:'Instagram',url:'https://instagram.com',desc:'My visual world',clicks:0},
  ];
  saveLinks();
}

function save(){localStorage.setItem('lp_profile',JSON.stringify(profile))}
function saveLinks(){localStorage.setItem('lp_links',JSON.stringify(links))}

function applyTheme(){
  document.body.className=`theme-${profile.theme}`;
  const t=THEMES.find(x=>x.id===profile.theme);
  if(t){
    const orbs=document.querySelectorAll('.orb');
    orbs[0].style.background=`rgba(${hexToRgb(t.colors[0])},.5)`;
    orbs[1].style.background=`rgba(${hexToRgb(t.colors[1])},.4)`;
  }
  document.querySelectorAll('.theme-dot').forEach(d=>d.classList.toggle('active',d.dataset.theme===profile.theme));
}
function hexToRgb(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`${r},${g},${b}`}

function renderThemeBar(){
  document.getElementById('theme-bar').innerHTML=THEMES.map(t=>`
    <div class="theme-dot ${t.id===profile.theme?'active':''}" data-theme="${t.id}"
      style="background:linear-gradient(135deg,${t.colors[0]},${t.colors[1]})"
      onclick="setTheme('${t.id}')" title="${t.label}"></div>`).join('');
}
function setTheme(t){profile.theme=t;save();applyTheme();renderThemeBar()}

function renderProfile(){
  document.getElementById('avatar').textContent=profile.avatar||'😎';
  document.getElementById('profile-name').innerHTML=`${profile.name} <span class="edit-hint">✏️</span>`;
  document.getElementById('profile-bio').textContent=profile.bio;
  document.getElementById('visit-count').textContent=`${totalVisits} profile view${totalVisits!==1?'s':''}`;
}

function renderLinks(){
  const wrap=document.getElementById('links-wrap');
  wrap.innerHTML=links.map((l,i)=>`
    <div class="link-card" onclick="handleLinkClick(${l.id},'${l.url}')">
      <span class="link-visits">${l.clicks||0} clicks</span>
      <div class="link-icon">${l.icon||'🔗'}</div>
      <div class="link-text">
        <span class="link-title">${l.title}</span>
        ${l.desc?`<span class="link-desc">${l.desc}</span>`:''}
      </div>
      <button onclick="event.stopPropagation();openEditLink(${l.id})" style="background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.5);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:.75rem;transition:all .15s;flex-shrink:0" title="Edit">✏️</button>
      <span class="link-arrow">→</span>
    </div>`).join('');
}

function handleLinkClick(id,url){
  const l=links.find(x=>x.id===id);
  if(l){l.clicks=(l.clicks||0)+1;saveLinks();renderLinks()}
  window.open(url,'_blank','noopener');
}

function openProfileEdit(){
  document.getElementById('pe-name').value=profile.name;
  document.getElementById('pe-bio').value=profile.bio;
  document.getElementById('pe-avatar').value=profile.avatar||'😎';
  document.getElementById('profile-modal').classList.add('open');
  setTimeout(()=>document.getElementById('pe-name').focus(),50);
}
function saveProfile(){
  profile.name=document.getElementById('pe-name').value.trim()||'Your Name';
  profile.bio=document.getElementById('pe-bio').value.trim()||'Your bio goes here';
  profile.avatar=document.getElementById('pe-avatar').value.trim()||'😎';
  save();renderProfile();closeModal('profile-modal');
}

function openAddLink(){
  editingLink=null;
  document.getElementById('link-modal-title').textContent='Add Link';
  document.getElementById('lm-icon').value='';
  document.getElementById('lm-title').value='';
  document.getElementById('lm-url').value='';
  document.getElementById('lm-desc').value='';
  document.getElementById('lm-del').style.display='none';
  document.getElementById('link-modal').classList.add('open');
  setTimeout(()=>document.getElementById('lm-title').focus(),50);
}
function openEditLink(id){
  const l=links.find(x=>x.id===id);if(!l)return;
  editingLink=id;
  document.getElementById('link-modal-title').textContent='Edit Link';
  document.getElementById('lm-icon').value=l.icon||'';
  document.getElementById('lm-title').value=l.title;
  document.getElementById('lm-url').value=l.url;
  document.getElementById('lm-desc').value=l.desc||'';
  document.getElementById('lm-del').style.display='block';
  document.getElementById('link-modal').classList.add('open');
}
function saveLink(){
  const title=document.getElementById('lm-title').value.trim();
  const url=document.getElementById('lm-url').value.trim();
  if(!title||!url){alert('Title and URL are required');return}
  const icon=document.getElementById('lm-icon').value.trim()||'🔗';
  const desc=document.getElementById('lm-desc').value.trim();
  if(editingLink){
    const l=links.find(x=>x.id===editingLink);
    if(l){Object.assign(l,{icon,title,url,desc})}
  }else{
    links.push({id:Date.now(),icon,title,url,desc,clicks:0});
  }
  saveLinks();renderLinks();closeModal('link-modal');
}
function deleteLink(){
  if(!editingLink)return;
  links=links.filter(l=>l.id!==editingLink);
  saveLinks();renderLinks();closeModal('link-modal');
}

function closeModal(id){document.getElementById(id).classList.remove('open')}
document.querySelectorAll('.modal-bg').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open')}));

function copyPageUrl(){
  navigator.clipboard.writeText(window.location.href).then(()=>{
    const btn=document.querySelector('.top-btn.primary');
    const orig=btn.textContent;btn.textContent='✓ Copied!';
    setTimeout(()=>btn.textContent=orig,2000);
  });
}
function resetAll(){if(confirm('Reset everything?')){localStorage.clear();location.reload()}}

renderThemeBar();applyTheme();renderProfile();renderLinks();
</script>
</body>
</html>
